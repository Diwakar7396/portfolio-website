<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Visitors - Diwakar B Portfolio</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
      .visitors-section {
        padding: 60px 20px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .visitors-section h1 {
        text-align: center;
        margin-bottom: 50px;
        color: var(--text-color);
      }

      .visitors-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .stat-card {
        background: var(--card-bg);
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .stat-card h3 {
        color: var(--primary-color);
        font-size: 2rem;
        margin-bottom: 10px;
      }

      .stat-card p {
        color: var(--text-secondary);
      }

      .visitors-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
      }

      .visitor-card {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .visitor-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      .visitor-card h3 {
        color: var(--text-color);
        margin-bottom: 10px;
        font-size: 1.3rem;
      }

      .visitor-time {
        color: var(--text-secondary);
        font-size: 0.9rem;
        margin-bottom: 10px;
      }

      .visitor-icon {
        color: var(--primary-color);
        font-size: 2rem;
        margin-bottom: 10px;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: var(--text-secondary);
      }

      .error-message {
        background: #ffebee;
        color: #c62828;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        text-align: center;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
      }

      .empty-state i {
        font-size: 3rem;
        color: var(--text-secondary);
        margin-bottom: 20px;
      }

      .refresh-btn {
        background: var(--primary-color);
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        margin-top: 20px;
        transition: background 0.3s ease;
      }

      .refresh-btn:hover {
        background: var(--primary-dark);
      }

      @media (max-width: 600px) {
        .visitors-section {
          padding: 30px 15px;
        }

        .visitors-section h1 {
          margin-bottom: 30px;
        }

        .visitors-list {
          grid-template-columns: 1fr;
        }
      }
    </style>
</head>
<body>
    <header>
        <nav class="navbar" aria-label="Main navigation">
            <div class="nav-brand">
                <a href="portfolio.html">&#x1F4BC; Diwakar</a>
            </div>
            <div class="nav-container">
                <ul class="nav-menu">
                    <li><a href="portfolio.html" class="nav-link">Home</a></li>
                    <li><a href="education.html" class="nav-link">Education</a></li>
                    <li><a href="projects.html" class="nav-link">Projects</a></li>
                    <li><a href="contact.html" class="nav-link">Contact</a></li>
                    <li><a href="visitors.html" class="nav-link active">Visitors</a></li>
                </ul>
                <button class="theme-toggle" aria-label="Toggle theme">
                    <i class="fas fa-toggle-on"></i>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section class="visitors-section">
            <h1>👥 Portfolio Visitors</h1>
            
            <div id="errorContainer"></div>
            
            <div class="visitors-stats" id="statsContainer">
                <div class="loading">
                    <p>Loading visitor data...</p>
                </div>
            </div>

            <div class="visitors-list" id="visitorsList">
                <div class="loading">
                    <p>Loading visitors...</p>
                </div>
            </div>

            <div style="text-align: center;">
                <button class="refresh-btn" onclick="loadVisitors()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </section>
    </main>

    <script>
      async function loadVisitors() {
        try {
          const response = await fetch('http://localhost:3000/api/visitors');
          
          if (!response.ok) {
            throw new Error('Failed to load visitors');
          }

          const visitors = await response.json();
          displayVisitors(visitors);
          displayStats(visitors);
          
        } catch (error) {
          console.error('Error loading visitors:', error);
          showError('Failed to load visitors. Make sure the backend server is running on port 3000.');
        }
      }

      function displayStats(visitors) {
        const statsContainer = document.getElementById('statsContainer');
        const totalVisitors = visitors.length;
        
        statsContainer.innerHTML = `
          <div class="stat-card">
            <h3>${totalVisitors}</h3>
            <p>Total Visitors</p>
          </div>
          <div class="stat-card">
            <h3>${new Date().toLocaleDateString()}</h3>
            <p>Today's Date</p>
          </div>
        `;
      }

      function displayVisitors(visitors) {
        const visitorsList = document.getElementById('visitorsList');
        
        if (!visitors || visitors.length === 0) {
          visitorsList.innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1;">
              <i class="fas fa-inbox"></i>
              <h3>No visitors yet</h3>
              <p>When people visit and enter their names, they'll appear here!</p>
            </div>
          `;
          return;
        }

        visitorsList.innerHTML = visitors
          .reverse()
          .map((visitor) => {
            const visitDate = new Date(visitor.timestamp);
            const formattedTime = visitDate.toLocaleString();
            
            return `
              <div class="visitor-card">
                <div class="visitor-icon">
                  <i class="fas fa-user-circle"></i>
                </div>
                <h3>${escapeHtml(visitor.name)}</h3>
                <p class="visitor-time">
                  <i class="fas fa-clock"></i> ${formattedTime}
                </p>
              </div>
            `;
          })
          .join('');
      }

      function showError(message) {
        const errorContainer = document.getElementById('errorContainer');
        errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // Load visitors when page loads
      window.addEventListener('load', loadVisitors);

      // Auto-refresh every 5 seconds
      setInterval(loadVisitors, 5000);
    </script>
</body>
</html>
