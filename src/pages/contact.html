<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Me - Diwakar B</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme immediately to prevent flash of default theme
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <header>
        <nav class="navbar" aria-label="Main navigation">
            <div class="nav-brand">
                <a href="portfolio.html">&#x1F4BC; Diwakar</a>
            </div>
            <div class="nav-container">
                <ul class="nav-menu">
                    <li><a href="portfolio.html" class="nav-link">Home</a></li>
                    <li><a href="education.html" class="nav-link">Education</a></li>
                    <li><a href="projects.html" class="nav-link">Projects</a></li>
                    <li><a href="contact.html" class="nav-link active">Contact</a></li>
                    <li><a href="visitors.html" class="nav-link">Visitors</a></li>
                </ul>
                <button class="theme-toggle" aria-label="Toggle theme">
                    <i class="fas fa-toggle-on"></i>
                </button>
            </div>
        </nav>
    </header>
    <main class="contact-page container">
        <h1 class="section-title">Contact Me</h1>
        <section class="contact-form-section">
            <h2>Get in Touch</h2>
            <div class="form-container">
                <form action="#" method="post" id="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" class="form-control" required></textarea>
                    </div>
                    <button type="submit" class="cta-button primary">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                </form>
            </div>
        </section>
        <section class="social-links-section">
            <h2>Connect With Me</h2>
            <div class="social-links">
                <a href="https://github.com/Diwakar7396" target="_blank" rel="noopener noreferrer" class="social-icon github" aria-label="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://www.instagram.com/lovely.divakar_/" target="_blank" rel="noopener noreferrer" class="social-icon instagram" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://www.linkedin.com/in/diwakar-b-24b300291/" target="_blank" rel="noopener noreferrer" class="social-icon linkedin" aria-label="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
            <a href="https://x.com/LovelyDivakar15" target="_blank" rel="noopener noreferrer" class="social-icon twitter" aria-label="X (Twitter)">
                <i class="fab fa-twitter"></i>
            </a>
            </div>
        </section>
    </main>
    <footer>
        <div class="copyright">
            <p>&copy; 2025 Diwakar B. All rights reserved.</p>
        </div>
    </footer>
    <button class="scroll-top" aria-label="Scroll to top" style="display:none;">
        ↑
    </button>
    <script src="../js/main.js"></script>
</body>
</html>
